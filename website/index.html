<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lagartejandro.com</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0b0402; overflow: hidden; }
    canvas { display: block; touch-action: none; }
    #hint {
      position: fixed;
      bottom: 28px;
      width: 100%;
      text-align: center;
      color: rgba(255, 180, 100, 0.2);
      font: 12px/1 'Helvetica Neue', Helvetica, sans-serif;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      pointer-events: none;
      transition: opacity 2s;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">press a key · touch the screen</div>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const hint   = document.getElementById('hint');

function resize() {
  canvas.width  = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener('resize', resize);

// ── Keyboard layout → normalised screen position ──────────────────────────────
const ROWS = [
  { keys: '`1234567890-=',  xOff: 0.00, yFrac: 0.18 },
  { keys: 'qwertyuiop[]\\', xOff: 0.04, yFrac: 0.38 },
  { keys: "asdfghjkl;'",    xOff: 0.07, yFrac: 0.58 },
  { keys: 'zxcvbnm,./',     xOff: 0.11, yFrac: 0.78 },
];

const KEY = {};
ROWS.forEach(({ keys, xOff, yFrac }) => {
  [...keys].forEach((k, col) => {
    KEY[k] = { xFrac: xOff + col / 13, yFrac };
  });
});

// ── Fractal Tree ───────────────────────────────────────────────────────────────
const trees = [];

class FractalTree {
  constructor(x, y, hue, rootAngle, scale = 1) {
    this.x        = x;
    this.y        = y;
    this.hue      = hue;
    this.life     = 1;
    this.decay    = Math.random() * 0.003 + 0.0018;
    this.angle    = rootAngle ?? -Math.PI * 0.5 + (Math.random() - 0.5) * 0.65;
    this.rootLen  = (Math.random() * 26 + 22) * scale;
    this.maxDepth = 7 + Math.floor(Math.random() * 2);
    this.spread   = 0.30 + Math.random() * 0.28;
    this.ratio    = 0.60 + Math.random() * 0.12;
    this.age      = 0;
    this.growTime = 28 + Math.floor(Math.random() * 18);
  }

  get visibleDepth() {
    return Math.min(this.maxDepth, Math.ceil((this.age / this.growTime) * (this.maxDepth + 1)));
  }

  update() {
    this.age++;
    if (this.age > this.growTime) this.life -= this.decay;
  }

  draw() {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.lineCap = 'round';
    this._branch(this.x, this.y, this.angle, this.rootLen, 0);
    ctx.restore();
  }

  _branch(x, y, angle, len, depth) {
    if (depth > this.visibleDepth || len < 0.5) return;

    const x2  = x + Math.cos(angle) * len;
    const y2  = y + Math.sin(angle) * len;
    const t   = depth / this.maxDepth;          // 0 at root → 1 at tips

    ctx.globalAlpha = this.life * (0.60 - t * 0.22);
    ctx.strokeStyle = `hsl(${this.hue + t * 28}, 80%, ${28 + t * 30}%)`;
    ctx.lineWidth   = Math.max(0.25, (1 - t * 0.88) * 2.8 * this.life);
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x2, y2);
    ctx.stroke();

    this._branch(x2, y2, angle - this.spread, len * this.ratio, depth + 1);
    this._branch(x2, y2, angle + this.spread, len * this.ratio, depth + 1);
  }
}

// ── Spawn helpers ─────────────────────────────────────────────────────────────
function spawnAt(x, y, hue, count = 3) {
  for (let i = 0; i < count; i++) {
    trees.push(new FractalTree(x, y, hue + (Math.random() - 0.5) * 22));
  }
}

function spawnKey(key, count = 3) {
  const info = KEY[key.toLowerCase()];
  if (!info) return;
  spawnAt(info.xFrac * canvas.width, info.yFrac * canvas.height, randomHue(), count);
}

function spawnSpace() {
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const hue = randomHue();
  const n   = 12;
  for (let i = 0; i < n; i++) {
    const angle = (i / n) * Math.PI * 2;
    trees.push(new FractalTree(cx, cy, hue + (i / n) * 50, angle, 1.5));
  }
}

function spawnSpaceTrickle() {
  const cx = canvas.width / 2, cy = canvas.height / 2;
  trees.push(new FractalTree(cx, cy, randomHue() + Math.random() * 50,
    Math.random() * Math.PI * 2, 1.2));
}

function spawnEnter() {
  for (let i = 0; i < 6; i++) {
    setTimeout(() => {
      const x = canvas.width  * (0.1 + Math.random() * 0.8);
      const y = canvas.height * (0.1 + Math.random() * 0.8);
      spawnAt(x, y, randomHue(), 2);
    }, i * 75);
  }
}

// ── Input ─────────────────────────────────────────────────────────────────────
const heldKeys      = new Set();
const lockedKeys    = new Set();
const activeTouches = new Map();
let erasing = false;
let hinted  = false;
let frame   = 0;

function randomHue() {
  // Curated bands — same as the original, beautiful with additive blending
  const bands = [[175, 210], [220, 265], [270, 310], [315, 345]];
  const [lo, hi] = bands[Math.floor(Math.random() * bands.length)];
  return lo + Math.random() * (hi - lo);
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (!hinted) { hint.style.opacity = '0'; hinted = true; }
  for (const t of e.changedTouches) {
    const hue = randomHue();
    activeTouches.set(t.identifier, { x: t.clientX, y: t.clientY, hue, frames: 0 });
    spawnAt(t.clientX, t.clientY, hue, 3);
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const touch = activeTouches.get(t.identifier);
    if (!touch) continue;
    touch.x = t.clientX;
    touch.y = t.clientY;
  }
}, { passive: false });

function endTouch(e) {
  for (const t of e.changedTouches) activeTouches.delete(t.identifier);
}
canvas.addEventListener('touchend',    endTouch);
canvas.addEventListener('touchcancel', endTouch);

addEventListener('keydown', e => {
  if (!hinted) { hint.style.opacity = '0'; hinted = true; }

  if (e.key === 'Backspace') { erasing = true; return; }
  if (e.key === ' ') {
    if (e.shiftKey) {
      if (lockedKeys.has(' ')) lockedKeys.delete(' ');
      else lockedKeys.add(' ');
    } else if (lockedKeys.has(' ')) {
      lockedKeys.delete(' ');
    } else if (!e.repeat) {
      spawnSpace();
    }
    return;
  }
  if (e.key === 'Enter') { if (!e.repeat) spawnEnter(); return; }
  if (e.repeat) return;

  const k = e.key.toLowerCase();

  if (e.shiftKey) {
    if (lockedKeys.has(k)) lockedKeys.delete(k);
    else lockedKeys.add(k);
    return;
  }

  if (lockedKeys.has(k)) { lockedKeys.delete(k); return; }

  spawnKey(k, 3);
  heldKeys.add(k);
});

addEventListener('keyup', e => {
  heldKeys.delete(e.key.toLowerCase());
  if (e.key === 'Backspace') erasing = false;
});

// ── Render loop ───────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  frame++;

  ctx.fillStyle = erasing ? 'rgba(11,4,2,0.28)' : 'rgba(11,4,2,0.022)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Throttle held/locked key spawns to one tree every 12 frames
  if (frame % 12 === 0) {
    for (const key of heldKeys)   spawnKey(key, 1);
    for (const key of lockedKeys) {
      if (key === ' ') spawnSpaceTrickle();
      else spawnKey(key, 1);
    }
  }

  // Throttle touch spawns similarly
  for (const touch of activeTouches.values()) {
    touch.frames++;
    if (touch.frames % 10 === 0) spawnAt(touch.x, touch.y, touch.hue, 1);
  }

  for (let i = trees.length - 1; i >= 0; i--) {
    trees[i].update();
    trees[i].draw();
    if (trees[i].life <= 0) trees.splice(i, 1);
  }

  if (trees.length > 200) trees.splice(0, trees.length - 200);
}

animate();
</script>
</body>
</html>
