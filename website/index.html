<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lagartejandro.com</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0b0402; overflow: hidden; }
    canvas { display: block; touch-action: none; }
    #hint {
      position: fixed;
      bottom: 28px;
      width: 100%;
      text-align: center;
      color: rgba(255, 180, 100, 0.2);
      font: 12px/1 'Helvetica Neue', Helvetica, sans-serif;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      pointer-events: none;
      transition: opacity 2s;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">press a key · touch the screen</div>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const hint   = document.getElementById('hint');

function resize() {
  canvas.width  = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener('resize', resize);

// ── Keyboard layout → normalised screen position ──────────────────────────────
const ROWS = [
  { keys: '`1234567890-=',  xOff: 0.00, yFrac: 0.18 },
  { keys: 'qwertyuiop[]\\', xOff: 0.04, yFrac: 0.38 },
  { keys: "asdfghjkl;'",    xOff: 0.07, yFrac: 0.58 },
  { keys: 'zxcvbnm,./',     xOff: 0.11, yFrac: 0.78 },
];

const KEY = {};
ROWS.forEach(({ keys, xOff, yFrac }, row) => {
  [...keys].forEach((k, col) => {
    const xFrac = xOff + col / 13;
    // Warm sweep: left = rose-red (340°) → centre = red (0°) → right = amber (50°)
    const hue = (xFrac * 70 + 340) % 360;
    KEY[k] = { xFrac, yFrac, hue, row };
  });
});

// ── Flow ribbon particle ───────────────────────────────────────────────────────
const particles = [];
const TRAIL = 35;

class Ribbon {
  constructor(x, y, hue, angle, speed) {
    this.x     = x;
    this.y     = y;
    this.hue   = hue;
    this.angle = angle  ?? Math.random() * Math.PI * 2;
    this.speed = speed  ?? Math.random() * 2 + 0.4;
    this.curl  = (Math.random() - 0.5) * 0.06; // direction drift per frame
    this.width = Math.random() * 2.5 + 0.8;
    this.life  = 1;
    this.decay = Math.random() * 0.004 + 0.0025;
    this.trail = [];
  }

  update() {
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > TRAIL) this.trail.shift();

    this.angle += this.curl;
    // Tiny upward drift keeps things feeling airy
    this.x += Math.cos(this.angle) * this.speed;
    this.y += Math.sin(this.angle) * this.speed - 0.1;
    this.speed *= 0.997;
    this.life  -= this.decay;
  }

  _path(pts) {
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length - 1; i++) {
      ctx.quadraticCurveTo(
        pts[i].x, pts[i].y,
        (pts[i].x + pts[i + 1].x) * 0.5,
        (pts[i].y + pts[i + 1].y) * 0.5,
      );
    }
    ctx.lineTo(pts[pts.length - 1].x, pts[pts.length - 1].y);
    ctx.stroke();
  }

  draw() {
    const pts = this.trail;
    if (pts.length < 3) return;

    // No shadowBlur — use 'lighter' composite so overlapping ribbons
    // add up to bright hot spots naturally, at zero blur cost.
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.lineCap  = 'round';
    ctx.lineJoin = 'round';

    // Ghost tail — full length, thin, dim
    ctx.globalAlpha = this.life * 0.18;
    ctx.strokeStyle = `hsl(${this.hue}, 90%, 52%)`;
    ctx.lineWidth   = this.width * 0.6;
    this._path(pts);

    // Bright head — front 40% of trail, thicker, vivid
    const split = Math.floor(pts.length * 0.6);
    ctx.globalAlpha = this.life * this.life * 0.75;
    ctx.strokeStyle = `hsl(${this.hue + 15}, 95%, 70%)`;
    ctx.lineWidth   = this.width * this.life;
    this._path(pts.slice(split));

    ctx.restore();
  }
}

// ── Spawn helpers ─────────────────────────────────────────────────────────────
function spawnAt(x, y, hue, count = 18) {
  for (let i = 0; i < count; i++) {
    particles.push(new Ribbon(x, y, hue + (Math.random() - 0.5) * 22));
  }
}

function spawnKey(key, count = 18) {
  const info = KEY[key.toLowerCase()];
  if (!info) return;
  spawnAt(info.xFrac * canvas.width, info.yFrac * canvas.height, info.hue, count);
}

function spawnSpace() {
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const hue = Math.random() * 50 + 330; // warm rose-red
  const n   = 70;
  for (let i = 0; i < n; i++) {
    const angle = (i / n) * Math.PI * 2;
    const speed = 2.5 + Math.random() * 3.5;
    particles.push(new Ribbon(cx, cy, hue + (i / n) * 50, angle, speed));
  }
}

function spawnEnter() {
  for (let i = 0; i < 6; i++) {
    setTimeout(() => {
      const x   = canvas.width  * (0.1 + Math.random() * 0.8);
      const y   = canvas.height * (0.1 + Math.random() * 0.8);
      const hue = (Math.random() * 70 + 330) % 360;
      spawnAt(x, y, hue, 24);
    }, i * 75);
  }
}

// ── Input ─────────────────────────────────────────────────────────────────────
const heldKeys = new Set();
// Active touches: id → { x, y, hue, frames }
const activeTouches = new Map();
const MAX_TOUCH_RATE = 14; // max ribbons spawned per touch per frame
let erasing = false;
let hinted  = false;

function hueFromPosition(x, y) {
  // Same warm sweep as the keyboard: left = rose-red, right = amber
  // Y adds a slight shift so top/bottom of screen feel different too
  return ((x / canvas.width) * 70 + (y / canvas.height) * 20 + 330) % 360;
}

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (!hinted) { hint.style.opacity = '0'; hinted = true; }
  for (const t of e.changedTouches) {
    const x   = t.clientX;
    const y   = t.clientY;
    const hue = hueFromPosition(x, y);
    activeTouches.set(t.identifier, { x, y, hue, frames: 0 });
    spawnAt(x, y, hue, 20); // initial burst, same as a keydown
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const touch = activeTouches.get(t.identifier);
    if (!touch) continue;
    touch.x   = t.clientX;
    touch.y   = t.clientY;
    touch.hue = hueFromPosition(touch.x, touch.y);
  }
}, { passive: false });

function endTouch(e) {
  for (const t of e.changedTouches) activeTouches.delete(t.identifier);
}
canvas.addEventListener('touchend',    endTouch);
canvas.addEventListener('touchcancel', endTouch);

addEventListener('keydown', e => {
  if (!hinted) { hint.style.opacity = '0'; hinted = true; }

  if (e.key === 'Backspace') { erasing = true; return; }
  if (e.key === ' ')         { if (!e.repeat) spawnSpace(); return; }
  if (e.key === 'Enter')     { if (!e.repeat) spawnEnter(); return; }

  if (!e.repeat) spawnKey(e.key, 20);
  heldKeys.add(e.key.toLowerCase());
});

addEventListener('keyup', e => {
  heldKeys.delete(e.key.toLowerCase());
  if (e.key === 'Backspace') erasing = false;
});

// ── Render loop ───────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);

  // Very slow fade → long painterly trails; hold Backspace to clear faster
  ctx.fillStyle = erasing ? 'rgba(11,4,2,0.28)' : 'rgba(11,4,2,0.022)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Continuous trickle from held keys
  for (const key of heldKeys) {
    spawnKey(key, 3);
  }

  // Touch: ramp up spawn rate the longer a finger is held, cap at MAX_TOUCH_RATE
  for (const touch of activeTouches.values()) {
    touch.frames++;
    const count = Math.min(3 + Math.floor(touch.frames / 8), MAX_TOUCH_RATE);
    spawnAt(touch.x, touch.y, touch.hue, count);
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].draw();
    if (particles[i].life <= 0) particles.splice(i, 1);
  }

  if (particles.length > 4000) particles.splice(0, particles.length - 4000);
}

animate();
</script>
</body>
</html>
