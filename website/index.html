<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lagartejandro.com</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #080208; overflow: hidden; }
    canvas { display: block; touch-action: none; }
    #hint {
      position: fixed;
      bottom: 28px;
      width: 100%;
      text-align: center;
      color: rgba(255, 180, 100, 0.18);
      font: 12px/1 'Helvetica Neue', Helvetica, sans-serif;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      pointer-events: none;
      transition: opacity 2s;
    }
    #type-label {
      position: fixed;
      top: 22px;
      width: 100%;
      text-align: center;
      color: rgba(255, 190, 110, 0.32);
      font: 11px/1 'Helvetica Neue', Helvetica, sans-serif;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      pointer-events: none;
      opacity: 1;
      transition: opacity 3s ease;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">press a key · touch the screen · tab to change shape</div>
<div id="type-label"></div>
<script>
const canvas    = document.getElementById('c');
const ctx       = canvas.getContext('2d');
const hint      = document.getElementById('hint');
const typeLabel = document.getElementById('type-label');

function resize() {
  canvas.width  = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener('resize', resize);

// ── Keyboard layout → normalised screen position ──────────────────────────────
const ROWS = [
  { keys: '`1234567890-=',  xOff: 0.00, yFrac: 0.18 },
  { keys: 'qwertyuiop[]\\', xOff: 0.04, yFrac: 0.38 },
  { keys: "asdfghjkl;'",    xOff: 0.07, yFrac: 0.58 },
  { keys: 'zxcvbnm,./',     xOff: 0.11, yFrac: 0.78 },
];
const KEY = {};
ROWS.forEach(({ keys, xOff, yFrac }) => {
  [...keys].forEach((k, col) => {
    KEY[k] = { xFrac: xOff + col / 13, yFrac };
  });
});

// ── Fractal type ──────────────────────────────────────────────────────────────
const FRACTAL_TYPES = ['snowflake', 'spiral', 'lightning', 'crystal', 'vine'];
const isMobile = !window.matchMedia('(pointer: fine)').matches;
let typeIndex = 0; // snowflake first
let pageType  = FRACTAL_TYPES[typeIndex];

function showTypeLabel() {
  typeLabel.textContent = pageType;
  typeLabel.style.transition = 'none';
  typeLabel.style.opacity = '1';
  clearTimeout(typeLabel._fadeTimer);
  typeLabel._fadeTimer = setTimeout(() => {
    typeLabel.style.transition = 'opacity 3s ease';
    typeLabel.style.opacity = '0';
  }, 1800);
}
showTypeLabel();

// ── Colour palette ────────────────────────────────────────────────────────────
function randomHue() {
  // Warm golds + cool blues / purples (inspired by the reference spiral image)
  const bands = [
    [15,  52],   // orange / amber
    [42,  68],   // gold / yellow
    [195, 230],  // cyan / sky
    [225, 265],  // blue / indigo
    [270, 315],  // purple / violet
  ];
  const [lo, hi] = bands[Math.floor(Math.random() * bands.length)];
  return lo + Math.random() * (hi - lo);
}

// ── Fractal Shape ─────────────────────────────────────────────────────────────
const shapes = [];

class FractalShape {
  constructor(x, y, hue, rootAngle, scale = 1) {
    this.x        = x;
    this.y        = y;
    this.hue      = hue;
    this.life     = 1;
    this.decay    = Math.random() * 0.0028 + 0.0016;
    this.age      = 0;
    this.growTime = 30 + Math.floor(Math.random() * 22);
    this.type     = pageType;
    this.maxDepth = 5 + Math.floor(Math.random() * 3);
    this.rootLen  = (20 + Math.random() * 28) * scale;

    // Fully random angle — no upward bias
    this.angle = (rootAngle !== undefined) ? rootAngle : Math.random() * Math.PI * 2;

    this._initType();
  }

  _initType() {
    switch (this.type) {

      case 'spiral':
        // Branches accumulate a twist per depth, creating nautilus-like coils
        this.spread   = 0.38 + Math.random() * 0.28;
        this.ratio    = 0.60 + Math.random() * 0.12;
        this.twist    = (0.10 + Math.random() * 0.20) * (Math.random() < 0.5 ? 1 : -1);
        this.curveDir = Math.sign(this.twist);
        this.curve    = 0.35 + Math.random() * 0.30;
        break;

      case 'snowflake':
        // Drawn with N-fold rotational symmetry, no twist
        this.spread   = Math.PI / 3 + (Math.random() - 0.5) * 0.18;
        this.ratio    = 0.48 + Math.random() * 0.14;
        this.twist    = 0;
        this.symmetry = Math.random() < 0.6 ? 6 : (Math.random() < 0.5 ? 8 : 5);
        this.jitter   = 0.07 + Math.random() * 0.09; // shimmer like lightning
        break;

      case 'lightning':
        // Wide-angle, jagged, per-segment jitter for electric feel
        this.spread = 0.55 + Math.random() * 0.55;
        this.ratio  = 0.50 + Math.random() * 0.16;
        this.twist  = (Math.random() * 0.08) * (Math.random() < 0.5 ? 1 : -1);
        this.jitter = 0.22 + Math.random() * 0.22;
        break;

      case 'crystal':
        // Occasional 3-way splits, sharp angles, slight inward twist
        this.spread  = Math.PI * 0.36 + Math.random() * 0.28;
        this.ratio   = 0.55 + Math.random() * 0.13;
        this.twist   = (Math.random() * 0.06) * (Math.random() < 0.5 ? 1 : -1);
        this.triple  = Math.random() < 0.45; // whether this instance uses triple splits
        break;

      case 'vine':
        // Slow-spreading with bezier curves giving a curling, tendril feel
        this.spread   = 0.20 + Math.random() * 0.20;
        this.ratio    = 0.68 + Math.random() * 0.10;
        this.twist    = (0.05 + Math.random() * 0.16) * (Math.random() < 0.5 ? 1 : -1);
        this.curveDir = Math.sign(this.twist) || 1;
        this.curve    = 0.30 + Math.random() * 0.35;
        break;
    }
  }

  get visibleDepth() {
    return Math.min(
      this.maxDepth,
      Math.ceil((this.age / this.growTime) * (this.maxDepth + 1))
    );
  }

  update() {
    this.age++;
    if (this.age > this.growTime) this.life -= this.decay;
  }

  draw() {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.lineCap  = 'round';
    ctx.lineJoin = 'round';

    if (this.type === 'snowflake') {
      const sym = this.symmetry || 6;
      for (let i = 0; i < sym; i++) {
        const a = this.angle + (i / sym) * Math.PI * 2;
        this._branch(this.x, this.y, a, this.rootLen, 0);
      }
    } else {
      this._branch(this.x, this.y, this.angle, this.rootLen, 0);
    }

    ctx.restore();
  }

  _branch(x, y, angle, len, depth) {
    if (depth > this.visibleDepth || len < 0.45) return;

    const t   = depth / this.maxDepth;
    const alp = this.life * (0.68 - t * 0.30);
    const lw  = Math.max(0.18, (1 - t * 0.88) * 3.0 * this.life);

    ctx.globalAlpha = alp;
    ctx.strokeStyle = `hsl(${this.hue + t * 50}, 88%, ${16 + t * 46}%)`;
    ctx.lineWidth   = lw;

    // Accumulate twist each level
    const tAngle = angle + (this.twist || 0) * depth;

    let x2, y2;

    if (this.type === 'spiral') {
      // Bezier curve that winds in the twist direction
      x2 = x + Math.cos(tAngle) * len;
      y2 = y + Math.sin(tAngle) * len;
      const cpA = angle + (this.twist || 0) * depth * 0.5 + this.curveDir * this.curve;
      const cpx = x + Math.cos(cpA) * len * 0.72;
      const cpy = y + Math.sin(cpA) * len * 0.72;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.quadraticCurveTo(cpx, cpy, x2, y2);
      ctx.stroke();

    } else if (this.type === 'vine') {
      // Gentle curling bezier
      x2 = x + Math.cos(tAngle) * len;
      y2 = y + Math.sin(tAngle) * len;
      const cpA = tAngle + this.curveDir * this.curve * 0.6;
      const cpx = x + Math.cos(cpA) * len * 0.68;
      const cpy = y + Math.sin(cpA) * len * 0.68;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.quadraticCurveTo(cpx, cpy, x2, y2);
      ctx.stroke();

    } else {
      // Straight segment (lightning adds per-segment jitter)
      const jitter = this.jitter ? (Math.random() - 0.5) * this.jitter : 0;
      const fAngle = tAngle + jitter;
      x2 = x + Math.cos(fAngle) * len;
      y2 = y + Math.sin(fAngle) * len;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x2, y2);
      ctx.stroke();
    }

    const nextLen = len * this.ratio;

    if (this.type === 'crystal' && this.triple && depth % 2 === 0) {
      // Triple split on even depths
      this._branch(x2, y2, tAngle - this.spread, nextLen,          depth + 1);
      this._branch(x2, y2, tAngle,               nextLen * 0.72,   depth + 1);
      this._branch(x2, y2, tAngle + this.spread, nextLen,          depth + 1);
    } else {
      this._branch(x2, y2, tAngle - this.spread, nextLen, depth + 1);
      this._branch(x2, y2, tAngle + this.spread, nextLen, depth + 1);
    }
  }
}

// ── Spawn helpers ─────────────────────────────────────────────────────────────
function spawnAt(x, y, hue, count = 3) {
  for (let i = 0; i < count; i++) {
    shapes.push(new FractalShape(x, y, hue + (Math.random() - 0.5) * 24));
  }
}

function spawnKey(key, count = 3) {
  const info = KEY[key.toLowerCase()];
  if (!info) return;
  spawnAt(info.xFrac * canvas.width, info.yFrac * canvas.height, randomHue(), count);
}

function spawnSpace() {
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const hue = randomHue();
  const n   = 10;
  for (let i = 0; i < n; i++) {
    const angle = (i / n) * Math.PI * 2;
    shapes.push(new FractalShape(cx, cy, hue + (i / n) * 55, angle, 1.5));
  }
}

function spawnSpaceTrickle() {
  const cx = canvas.width / 2, cy = canvas.height / 2;
  shapes.push(new FractalShape(
    cx, cy,
    randomHue() + Math.random() * 55,
    Math.random() * Math.PI * 2,
    1.2
  ));
}

function spawnEnter() {
  for (let i = 0; i < 6; i++) {
    setTimeout(() => {
      const x = canvas.width  * (0.1 + Math.random() * 0.8);
      const y = canvas.height * (0.1 + Math.random() * 0.8);
      spawnAt(x, y, randomHue(), 2);
    }, i * 75);
  }
}

// ── Input ─────────────────────────────────────────────────────────────────────
const heldKeys      = new Set();
const lockedKeys    = new Set();
const activeTouches = new Map();
let erasing = false;
let hinted  = false;
let frame   = 0;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (!hinted) { hint.style.opacity = '0'; hinted = true; }
  for (const t of e.changedTouches) {
    const hue = randomHue();
    activeTouches.set(t.identifier, { x: t.clientX, y: t.clientY, hue, frames: 0 });
    spawnAt(t.clientX, t.clientY, hue, 3);
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const touch = activeTouches.get(t.identifier);
    if (!touch) continue;
    touch.x = t.clientX;
    touch.y = t.clientY;
  }
}, { passive: false });

function endTouch(e) {
  for (const t of e.changedTouches) activeTouches.delete(t.identifier);
}
canvas.addEventListener('touchend',    endTouch);
canvas.addEventListener('touchcancel', endTouch);

addEventListener('keydown', e => {
  if (!hinted) { hint.style.opacity = '0'; hinted = true; }

  if (e.key === 'Backspace') { erasing = true; return; }

  if (e.key === 'Tab' && !isMobile) {
    e.preventDefault();
    typeIndex = (typeIndex + (e.shiftKey ? -1 : 1) + FRACTAL_TYPES.length) % FRACTAL_TYPES.length;
    pageType  = FRACTAL_TYPES[typeIndex];
    showTypeLabel();
    return;
  }

  if (e.key === ' ') {
    if (e.shiftKey) {
      if (lockedKeys.has(' ')) lockedKeys.delete(' ');
      else lockedKeys.add(' ');
    } else if (lockedKeys.has(' ')) {
      lockedKeys.delete(' ');
    } else if (!e.repeat) {
      spawnSpace();
    }
    return;
  }

  if (e.key === 'Enter') { if (!e.repeat) spawnEnter(); return; }
  if (e.repeat) return;

  const k = e.key.toLowerCase();

  if (e.shiftKey) {
    if (lockedKeys.has(k)) lockedKeys.delete(k);
    else lockedKeys.add(k);
    return;
  }

  if (lockedKeys.has(k)) { lockedKeys.delete(k); return; }

  spawnKey(k, 3);
  heldKeys.add(k);
});

addEventListener('keyup', e => {
  heldKeys.delete(e.key.toLowerCase());
  if (e.key === 'Backspace') erasing = false;
});

// ── Render loop ───────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  frame++;

  ctx.fillStyle = erasing ? 'rgba(8,2,8,0.30)' : 'rgba(8,2,8,0.022)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (frame % 12 === 0) {
    for (const key of heldKeys)   spawnKey(key, 1);
    for (const key of lockedKeys) {
      if (key === ' ') spawnSpaceTrickle();
      else spawnKey(key, 1);
    }
  }

  for (const touch of activeTouches.values()) {
    touch.frames++;
    if (touch.frames % 10 === 0) spawnAt(touch.x, touch.y, touch.hue, 1);
  }

  for (let i = shapes.length - 1; i >= 0; i--) {
    shapes[i].update();
    shapes[i].draw();
    if (shapes[i].life <= 0) shapes.splice(i, 1);
  }

  if (shapes.length > 220) shapes.splice(0, shapes.length - 220);
}

animate();
</script>
</body>
</html>
